<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" width="280" height="60">
  <defs>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="70%" stop-color="#FF9F1C"/>
      <stop offset="100%" stop-color="#FFD166"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <g font-family="'Fira Code', 'JetBrains Mono', 'Consolas', monospace" font-size="36" font-weight="800" letter-spacing="2">
    <text x="20" y="42" fill="url(#pulseGrad)" filter="url(#glow)">
      claw
      <tspan font-size="16" fill="#FFD166" dx="-8" dy="-12">✦</tspan>
    </text>
    <text x="135" y="42" fill="#E0E0E0" font-weight="400">code</text>
  </g>
  <g fill="#FF6B35" opacity="0.8">
    <rect x="100" y="48" width="3" height="6" rx="1.5">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="108" y="48" width="3" height="8" rx="1.5">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="116" y="48" width="3" height="6" rx="1.5">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="0.6s" repeatCount="indefinite"/>
    </rect>
  </g>
  <rect x="20" y="54" width="240" height="1" fill="url(#pulseGrad)" opacity="0.4"/>
</svg>
